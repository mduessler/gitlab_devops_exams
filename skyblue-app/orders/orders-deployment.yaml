apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: orders
  name: orders
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: orders
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: orders
    spec:
      containers:
        - args:
            - sh
            - -c
            - uvicorn main:app --reload --host 0.0.0.0
          envFrom:
            - configMapRef:
                name: orders--env
          image: baranbartu/k-orders:latest
          name: orders
          volumeMounts:
            - mountPath: /app
              name: orders-cm0
      restartPolicy: Always
      volumes:
        - configMap:
            name: orders-cm0
          name: orders-cm0
